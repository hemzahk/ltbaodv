[Config Fanet01]
description= Baseline simulation
network = Fanet
sim-time-limit = 1803s

num-rngs = 4

repeat = 10
seed-set = ${runnumber}

# Node type:

*.uav[*].typename = "TrustAwareNode"
*.uav[*].trustManager.windowCapacity = 5
*.uav[*].trustManager.windowCount = 20
#*.uav[*].trustManager.sourceExpireTime = 3s
*.uav[*].trustManager.alpha = 0.5

*.uav[*].trustRecommendation.trustRecommendationInterval = 5s

# Mobility:

*.uav[*].mobility.typename = "RandomWaypointMobility"
**.mobility.rng-0 = 2
*.uav[*].mobility.speed = 10mps #uniform(8mps, 10mps)
*.uav[*].mobility.waitTime = 1s #uniform(1s,2s)
*.uav[*].mobility.constraintAreaMinX = 0m
*.uav[*].mobility.constraintAreaMinY = 0m
*.uav[*].mobility.constraintAreaMinZ = 50m

*.uav[*].mobility.constraintAreaMaxX = 700m
*.uav[*].mobility.constraintAreaMaxY = 350m 
*.uav[*].mobility.constraintAreaMaxZ = 60m

# Physical layer:

*.uav[*].wlan[0].typename = "WirelessInterface"
*.uav[*].wlan[0].radio.typename = "UnitDiskRadio"
*.uav[*].wlan[0].radio.transmitter.communicationRange = 250m
#*.drone[*].wlan[0].radio.receiver.ignoreInterference = true
*.uav[*].wlan[0].radio.transmitter.interferenceRange = 400m
*.uav[*].**.bitrate = 11Mbps

*.visualizer.physicalLinkVisualizer.packetFilter = "UDPData*"

# Link layer & MAC

*.uav[*].wlan[0].mac.headerLength = 23B
*.uav[*].wlan[0].mac.typename = "PromiscuousCsmaCaMac"
*.uav[*].wlan[0].mac.ackTimeout = 300us
*.uav[*].wlan[0].queue.typename = "DropTailQueue"
*.uav[*].wlan[0].queue.packetCapacity = 15

# Network layer & routing

**.ipv4.rng-0 = 1

*.uav[*].ipv4.arp.typename = "GlobalArp"

*.configurator.config = xml("<config><interface hosts='**' address='10.0.0.x' netmask='255.255.255.0'/><autoroute metric='errorRate'/></config>")
*.uav[*].ipv4.routingTable.netmaskRoutes = ""

*.configurator.addStaticRoutes = false
*.configurator.addDefaultRoutes = false  
*.configurator.addSubnetRoutes  = false  

*.uav[*].ipv4.ip.typename = "TrustIpv4"

*.uav[*].routingApp.typename = "Aodv"
*.uav[*].routingApp.destinationOnlyFlag = true

*.visualizer.networkRouteVisualizer.displayRoutes = true
*.visualizer.networkRouteVisualizer.lineShift = 0
*.visualizer.networkRouteVisualizer.packetFilter = "UDPData*"

# Application layer

*.uav[0..4].numApps = 1
*.uav[0..4].app[0].typename = "UdpBasicApp"

*.uav[0..4].app[0].destPort = 5000
*.uav[0..4].app[0].messageLength = 256B
*.uav[0..4].app[0].sendInterval = 250ms#uniform(1s, 2s)
*.uav[0..4].app[0].packetName = "UDPData"
*.uav[0..4].app[0].stopTime = 1801s

*.uav[0].app[0].destAddresses = "uav[5]"
*.uav[1].app[0].destAddresses = "uav[6]"
*.uav[2].app[0].destAddresses = "uav[7]"
*.uav[3].app[0].destAddresses = "uav[8]"
*.uav[4].app[0].destAddresses = "uav[9]"

*.uav[5..9].numApps = 1
*.uav[5..9].app[0].typename = "UdpSink"
*.uav[5..9].app[0].localPort = 5000
*.uav[5..9].app[0].stopTime = 1803s

[Config Fanet02]
extends = Fanet01
description = 20% Malicious nodes

*.uav[12..14].ipv4.ip.isMalicious = true
*.uav[12..14].ipv4.ip.dropProbability = 1.00

[Config Fanet03]
extends = Fanet02
description = Trust Based AODV

*.uav[*].routingApp.typename = "TrustAodv"


